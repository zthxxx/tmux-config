# ~/.config/tmux/tmux.conf
# https://quickref.me/tmux
# https://man7.org/linux/man-pages/man1/tmux.1.html

# Install
#
# ```bash
# mkdir -p ~/.config/tmux
# curl -L https://github.com/zthxxx/tmux-config/raw/main/tmux.conf -o ~/.config/tmux/tmux.conf
# ```
#
# or for development:
#
# ```bash
# git clone --depth=1 git@github.com:zthxxx/tmux-config.git tmux-config
# cd tmux-config
# mkdir -p ~/.config/tmux
# ln -fs "`pwd`/tmux.conf" ~/.config/tmux/tmux.conf
#
# # Tmux Plugin Manager  https://github.com/tmux-plugins/tpm
# git clone --depth=1 https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
# ```
#
# then in tmux, hit `prefix + I` to fetch plugins and source them.
#

######################
#
# Note:
#   - run `tmux list-keys -T prefix` to list all prefix key bindings
#   - by default, `<prefix> + Ctrl-o` rotates panes in the current window
#
#

######################

#
# -- Common Settings --
#
# set-option: (alias set)
# set-window-option: (alias setw)

setw -g mode-keys emacs

# Enable xterm keys to correctly interpret key sequences
setw -g xterm-keys on

# No delay for escape key sequences
set -s escape-time 0

# Repeat rate when a key is held down
set -sg repeat-time 300

# Enable focus events for terminal
set -s focus-events on


# Enable mouse support (toggle with F10)
set -g mouse on

# Passthrough for richer terminal/shell integration (e.g. yazi image preview, kitty, ghostty).
# Note: these don't enable Option+Click cursor placement — that requires tmux mouse capture
# to be disabled so the terminal handles the click natively.
# https://yazi-rs.github.io/docs/image-preview/#tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g extended-keys on
set -ga terminal-features ',xterm-256color:extkeys,focus,clipboard,hyperlinks'
set -ga terminal-features ',xterm-kitty:extkeys,focus,clipboard,hyperlinks'
set -ga terminal-features ',xterm-ghostty:extkeys,focus,clipboard,hyperlinks'

# --- Mouse scroll & selection behavior ---------------------------------------
# Copy on drag/double-click without exiting copy mode — preserves scroll position.
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection
bind-key -T copy-mode DoubleClick1Pane \
  select-pane \;\
  send-keys -X select-word \;\
  run-shell -d 0.15 \;\
  send-keys -X copy-selection

# --- Extra search bindings for emacs key mode -------------------------------
#
## How to search forward:
##   - `Ctrl-r` in copy mode (default emacs binding)
##   - `prefix + /` in normal mode
##   - `/` in copy mode
#
## Keys while searching:
##   - `Ctrl-r` — jump to previous match (backward)
##   - `n` / `N` — previous / next match
#
## How `prefix + /` works:
##   enters copy mode, then opens an incremental search prompt;
##   `%%%` in the send command expands to whatever you type at the prompt.

bind-key / copy-mode \; command-prompt -i -p "search forward:" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode / \; command-prompt -i -p "search forward:" "send -X search-forward-incremental \"%%%\""

# Exit tmux automatically when there are no sessions left
set -sg exit-empty on

# Quietly enable UTF-8 support for status line
set -q -g status-utf8 on

# Quietly enable UTF-8 support for windows
setw -q -g utf8 on

# No popup for activity alerts — just highlight the window tab
set -g visual-activity off

# Monitor activity in all windows
setw -g monitor-activity on
setw -g bell-action any

# Monitor bell events in all windows
setw -g monitor-bell on

set -g default-terminal "tmux-256color"

# Scroll history
set -g history-limit 65535

#
# -- Window display --
#

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
setw -g pane-base-index 1

# Auto-rename windows to the current directory basename
setw -g automatic-rename on

# `b:` for basename
# set -g automatic-rename-format '#(print -P %1~)'
set -g automatic-rename-format '#{b:pane_current_path}'

# Re-number windows when one is closed (no gaps)
set -g renumber-windows on

# Sync terminal title with current program/directory
set -g set-titles on

# Show pane numbers for 2s
set -g display-panes-time 2000

# Show messages for 2s
set -g display-time 2000

# Refresh status bar every second
set -g status-interval 1


# Key bindings

#
# -- Prefix key --
# Remap prefix from Ctrl-B to Ctrl-S
#
unbind-key C-b
unbind-key C-s
set -g prefix C-s
# type prefix twice to send it through to a nested session
bind-key C-s send-prefix

#
# bind-key: (alias bind)
#   Bind key key to command.  Keys are bound in a key table.
#   - By default (without -T), the key is bound in the **prefix** key table.
#   - `-n` is an alias for `-T` root.
#   - The `-r` flag indicates this key may repeat, see the `repeat-time` option.
#
#   C: Ctrl
#   M: Meta (Alt / Option)
#   S: Shift
#
# https://man7.org/linux/man-pages/man1/tmux.1.html#KEY_BINDINGS
#

# Reload config
bind-key C-r 'source-file ~/.config/tmux/tmux.conf; display "  tmux config reloaded!  "'

# Alt+1-0 to jump to windows 1–10 (M = Meta/Alt)
bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9
bind-key -n M-0 select-window -t :10

# Alt+Shift+1-9 to move current pane to window 1–9
bind-key -n 'M-!' join-pane -t :1
bind-key -n 'M-@' join-pane -t :2
bind-key -n 'M-#' join-pane -t :3
bind-key -n 'M-$' join-pane -t :4
bind-key -n 'M-%' join-pane -t :5
bind-key -n 'M-^' join-pane -t :6
bind-key -n 'M-&' join-pane -t :7
bind-key -n 'M-*' join-pane -t :8
bind-key -n 'M-(' join-pane -t :9

# Split pane in the current window — vim-style directions:
#
#     K
#  H  J  L
#
bind-key k split-window -vb -c "#{pane_current_path}"
bind-key j split-window -v -c "#{pane_current_path}"
bind-key h split-window -hb -c "#{pane_current_path}"
bind-key l split-window -h -c "#{pane_current_path}"


bind-key -n F2 previous-window
bind-key -n F3 next-window
# Ctrl-F* alternatives for VSCode/CloudIDE terminals where bare F-keys may be intercepted
bind-key -n C-F2 previous-window
bind-key -n C-F3 next-window

bind-key -n F5 new-window -c "#{pane_current_path}"
bind-key -n C-F5 new-window -c "#{pane_current_path}"
bind-key -n F6 detach
bind-key -n C-F6 detach
bind-key -n F7 kill-pane

# F8: rename current window (pre-filled with its current name)
bind-key -n F8 command-prompt -I "#W" "rename-window '%%'"
# Ctrl-F8: rename current session (pre-filled with its current name)
bind-key -n C-F8 command-prompt -I "#S" "rename-session '%%'"

# F10 — toggle mouse on/off
bind-key -n F10 "display 'Turn Mouse #{?mouse,OFF,ON}'; set mouse #{?mouse,off,on};"

# F12 — toggle nested-tmux pass-through mode
# (on macOS, you may need to free up F12 in System Settings first)
# 1. Set prefix to None — stop intercepting keystrokes
# 2. Switch key-table to nest-tmux; F12 in that table exits the mode
# 3. Tint the status bar so you know pass-through is active
# 4. Cancel any active copy/search mode
unbind-key -n F12
bind-key -n F12 \
  set prefix None \;\
  set key-table nest-tmux \;\
  set status-style bg=colour23 \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

# Bind F12 in the nest-tmux table to restore all overridden options and exit the mode.
#   The -u flag unsets an option, so the session inherits it from global options again.
bind-key -T nest-tmux F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Move current window left/right in the list (repeatable)
# https://github.com/tmux-plugins/tmux-pain-control/blob/master/pain_control.tmux#L29C1-L29C21
bind-key -r "<" swap-window -d -t -1
bind-key -r ">" swap-window -d -t +1

#
# -- theme --
#
# [Format](https://man7.org/linux/man-pages/man1/tmux.1.html#FORMATS)
# [STYLES](https://man7.org/linux/man-pages/man1/tmux.1.html#STYLES)
#

# Transparent status bar
set -g status-position bottom
set -g status-style "bg=default"

# Left: session name
set -g status-left-length 60
set -g status-left "#[fg=colour7]tmux: #[bold]#{session_name} | "


# Right: hostname and clock
set -g status-right-length 60
set -g status-right "#[fg=colour7] #{host} | %Y-%m-%d %H:%M:%S"

# Use pane border to simulate a top overline on the status bar
set -g pane-border-format ''
set -g pane-border-status bottom

## With a single pane, hide the active border highlight (no green border). tmux 3.3+ only.
##   -F treats the first argument as a format string instead of a shell command.
if-shell -F '#{>=:#{version},3.3}' {
  set -g pane-active-border-style "#{?pane_in_mode,fg=yellow,#{?synchronize-panes,fg=red,fg=#{?#{==:#{window_panes},1},default,green}}}"
}

# Window style

set -g window-status-activity-style 'none'
set -g window-status-format '#{?window_activity_flag,#[underscore],#[none]}#[fg=colour12]#{window_index}.#{window_name}'
set -g window-status-current-format '#[fg=colour13,bold,reverse][#{window_index}.#{window_name}]'
set -g window-status-separator '  '

set -g default-shell $SHELL

# Plugins

## Tmux Plugin Manager https://github.com/tmux-plugins/tpm
### Key bindings
###   prefix + I       — install new plugins and reload tmux env
###   prefix + U       — update plugins
###   prefix + Alt + u — remove unlisted plugins

set -g @plugin 'tmux-plugins/tmp'

## https://github.com/tmux-plugins/tmux-resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
## Custom bindings — prefix + Alt-Shift-S to save, prefix + Alt-Shift-R to restore
## https://github.com/tmux-plugins/tmux-resurrect/blob/master/docs/custom_key_bindings.md
set -g @resurrect-save 'M-S'
set -g @resurrect-restore 'M-R'


## https://github.com/tmux-plugins/tmux-continuum
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'


# https://github.com/kiyoon/treemux
#
## Requires Neovim and pynvim (`uv tool install --upgrade pynvim`)
#
## Key bindings
##   prefix + Tab       — toggle sidebar
##   prefix + Backspace — toggle sidebar and focus it
#

set -g @treemux-tree-client 'neo-tree'  # 'nvim-tree' or 'neo-tree'; `neo-tree` used by LazyVim
set -g @treemux-tree-nvim-init-file '~/.config/tmux/plugins/treemux/configs/treemux_init.lua'
set -g @plugin 'kiyoon/treemux'


###############

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
